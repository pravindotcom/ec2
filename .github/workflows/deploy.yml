name: Deploy to EC2

on:
  push:
     branch:
        - main

jobs:
   builds-and-deploy:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v3

          # login to dockerhub
        - name: Login to Docker Hub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        - name: Build image
          run: docker build -t ${{ secrets.DOCKER_USERNAME  }}/myapp .

        - name: Push Docker Image
          run: docker push ${{ secrets.DOCKER_USERNAME  }}/myapp 

        - name: Deploy to EC2 
          uses: appleboy/ssh-action@v0.1.10
          with:
             host: ${{ secrets.EC2_HOST }}
             username: ${{ secrets.EC2_USER }}
             key: ${{ secrets.EC2_SSH_KEY }}
             script: | 
                 cd ec2
                 git pull origin main
                 
                 docker stop mycontainer || true
                 docker rm mycontainer || true

                 docker pull ${{ secrets.DOCKER_USERNAME  }}/myapp

                 docker run -d -p 8080:8080 --name mycontainer ${{ secrets.DOCKER_USERNAME  }}/myapp
                 
